<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
  }
</style>
</head>
<body>

<div id="output"></div>

<script>
  const today = new Date();

  // --- STEP 1: Financial year start (29th September)
  const year = today.getFullYear();
  let fyStart = new Date(year, 8, 29); // September = 8

  if (today < fyStart) {
    fyStart = new Date(year - 1, 8, 29);
  }

  // --- STEP 2: Calculate week (STRICT 7-day blocks from 29 Sept)
  const diffDays = Math.floor((today - fyStart) / (1000 * 60 * 60 * 24));
  let week = Math.floor(diffDays / 7) + 1;

  // Safety cap (some years can go to 53 weeks)
  if (week > 53) week = 53;

  // --- STEP 3: Period (4 weeks per period)
  let period = Math.ceil(week / 4);
  if (period > 13) period = 13;

  // --- STEP 4: Quarter (fixed to 4)
  let quarter;
  if (period <= 3) quarter = 1;
  else if (period <= 6) quarter = 2;
  else if (period <= 9) quarter = 3;
  else quarter = 4;

  // --- OUTPUT
  document.getElementById("output").innerText =
    `WEEK ${week} | P${period} | Q${quarter}`;
</script>

</body>
</html>
